<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tuyển Chọn Support</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#00b4ff,#004cff);
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#00eaff55,transparent 60%);
animation:bgmove 10s linear infinite;
}

@keyframes bgmove{
0%{transform:translate(-20%,-20%)}
50%{transform:translate(-10%,10%)}
100%{transform:translate(-20%,-20%)}
}

.box{
width:650px;
padding:40px;
border-radius:15px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(15px);
color:white;
text-align:center;
animation:fade 0.7s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px)
}
to{
opacity:1;
transform:translateY(0)
}
}

h1{
margin-top:0;
text-shadow:0 0 10px #00eaff;
}

input,textarea{
width:95%;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
font-size:15px;
background:#ffffffdd;
transition:0.2s;
}

input:focus,textarea:focus{
outline:none;
transform:scale(1.02);
box-shadow:0 0 10px #00eaff;
}

textarea{
height:170px;
resize:none;
}

button{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:8px;
font-weight:bold;
font-size:15px;
cursor:pointer;
background:linear-gradient(90deg,#00ffd5,#00aaff);
color:black;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00eaff;
}

.hidden{
display:none;
}

.stop{
font-size:45px;
color:red;
font-weight:bold;
text-shadow:0 0 15px red;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:1}
50%{opacity:0.4}
100%{opacity:1}
}

</style>
</head>

<body>

<div class="box" id="start">

<h1>Tuyển Chọn Support</h1>

<input id="username" placeholder="Nhập Tên Người Dùng">

<br>

<button onclick="startTest()">Bắt Đầu Kiểm Tra</button>

</div>

<div class="box hidden" id="q1">

<h2>Câu 1</h2>

<p>Lua / Luau là gì? Viết code 1 GUI Lua / Luau bất kỳ</p>

<textarea id="answer1"></textarea>

<button onclick="nextQuestion()">Câu Hỏi Tiếp Theo</button>

</div>

<div class="box hidden" id="q2">

<h2>Câu 2</h2>

<p>VM , Control Flow là gì trong Obfuscator?</p>

<textarea id="answer2"></textarea>

<button onclick="submitTest()">Nộp Bài</button>

</div>

<div class="box hidden" id="stop">

<div class="stop">STOP AI!</div>

</div>

<script>

let cancelled=false

function stopAI(){

if(cancelled)return

cancelled=true

document.getElementById("start").classList.add("hidden")
document.getElementById("q1").classList.add("hidden")
document.getElementById("q2").classList.add("hidden")

document.getElementById("stop").classList.remove("hidden")

}

function startTest(){

let name=document.getElementById("username").value

if(name.trim()==""){
alert("Nhập tên trước")
return
}

document.getElementById("start").classList.add("hidden")
document.getElementById("q1").classList.remove("hidden")

}

function nextQuestion(){

document.getElementById("q1").classList.add("hidden")
document.getElementById("q2").classList.remove("hidden")

}

async function submitTest(){

if(cancelled)return

let name=document.getElementById("username").value
let a1=document.getElementById("answer1").value
let a2=document.getElementById("answer2").value

await fetch("/api/send",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:name,
q1:a1,
q2:a2
})
})

alert("Đã nộp bài!")

location.reload()

}

document.getElementById("answer1").addEventListener("paste",stopAI)
document.getElementById("answer2").addEventListener("paste",stopAI)

document.addEventListener("visibilitychange",function(){

if(document.hidden){
stopAI()
}

})

window.addEventListener("blur",function(){
stopAI()
})

</script>

</body>
</html>
